name: Deploy to Digital Ocean

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          script: |
            # If the directory doesn't exist, clone the repo
            if [ ! -d "~/luxeshake" ]; then
              git clone https://github.com/maandel/luxeshake.git ~/luxeshake
            fi
            
            cd ~/luxeshake
            
            # Pull latest changes
            git fetch --all
            git reset --hard origin/main
            
            # Restart containers, rebuilding them with the latest code
            docker compose up -d --build
