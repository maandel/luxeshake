name: Deploy to Digital Ocean

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p ~/luxeshake
            cd ~/luxeshake
            
            # Initialize git if it's not already a repository
            if [ ! -d ".git" ]; then
              git init
              git remote add origin https://github.com/maandel/luxeshake.git
            fi
            
            # Pull latest changes
            git fetch --all
            git reset --hard origin/main
            
            # Restart containers, rebuilding them with the latest code
            docker compose up -d --build
