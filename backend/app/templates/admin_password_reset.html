<html>
    <body style="font-family: Arial, sans-serif; background-color: #1A0C08; color: #F5E6DA; padding: 20px;">
        <div style="max-width: 600px; margin: 0 auto; background-color: #3E2723; padding: 30px; border-radius: 10px; border: 1px solid #C9963E;">
            <h2 style="color: #E8C87A; text-align: center;">Temporary Password Issued</h2>
            <p>Hello,</p>
            <p>An administrator has reset your password for the LuxeControl Portal. Use the temporary password below to log in:</p>
            <div style="text-align: center; margin: 30px 0;">
                <span style="font-size: 24px; letter-spacing: 2px; font-weight: bold; color: #E8C87A; background-color: #1A0C08; padding: 10px 20px; border-radius: 8px; border: 1px solid #C9963E;">{{temp_password}}</span>
            </div>
            <p>You will be required to change your password immediately after logging in.</p>
            <p style="text-align: center; margin-top: 30px;">
                <a href="{{login_link}}" style="background-color: #C9963E; color: #1A0C08; padding: 12px 24px; text-decoration: none; font-weight: bold; border-radius: 5px;">Go to LuxeControl Portal</a>
            </p>
        </div>
    </body>
</html>
