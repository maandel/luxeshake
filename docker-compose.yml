services:
  db:
    image: postgres:15-alpine
    container_name: luxeshake_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-luxeshake}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: luxeshake_api
    restart: unless-stopped
    depends_on:
      - db
    env_file:
      - ./backend/.env
    expose:
      - "8000"

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: luxeshake_web
    restart: unless-stopped
    env_file:
      - ./frontend/.env
    expose:
      - "3000"

  caddy:
    image: caddy:2.7-alpine
    container_name: luxeshake_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - web

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
